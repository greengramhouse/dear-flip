<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bookshelf - DearFlip Demo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- DearFlip CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #1e293b; /* slate-800 */
            background-image: radial-gradient(circle at 50% 0%, #334155 0%, #0f172a 100%);
            min-height: 100vh;
        }

        /* Bookshelf styling */
        .shelf {
            position: relative;
            margin-bottom: 5rem;
        }
        
        /* The wooden plank */
        .shelf::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -20px;
            right: -20px;
            height: 20px;
            background: linear-gradient(to bottom, #8B5A2B 0%, #5c3a18 100%);
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            z-index: 1;
        }
        
        /* The front depth of the plank */
        .shelf::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: -18px;
            right: -18px;
            height: 10px;
            background: #3e260e;
            border-radius: 0 0 4px 4px;
            z-index: 0;
        }

        /* Book hover animations */
        .book-cover {
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.1), inset -1px 0 2px rgba(255,255,255,0.3), 5px 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: bottom center;
            position: relative;
            z-index: 10;
        }
        
        /* Page edges effect on the right side of the cover */
        .book-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2px; /* Rest on the shelf */
        }

        .book-wrapper:hover .book-cover {
            transform: translateY(-15px) scale(1.05) rotateZ(-2deg);
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.1), inset -1px 0 2px rgba(255,255,255,0.3), 15px 25px 20px rgba(0,0,0,0.6);
            z-index: 20;
        }
        
        /* Floating click hint */
        .click-hint {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .book-wrapper:hover .click-hint {
            opacity: 1;
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col items-center py-12 px-4 sm:px-8 overflow-x-hidden">

    <div class="text-center mb-16">
        <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-orange-400 drop-shadow-sm mb-4">
            ชั้นหนังสือดิจิทัล
        </h1>
        <p class="text-slate-400 text-lg">คลิกที่หนังสือเพื่อเปิดอ่านแบบ 3D พลิกหน้าได้</p>
    </div>

    <!-- Bookshelf Container -->
    <div id="bookshelf-container" class="w-full max-w-5xl mx-auto flex flex-col gap-10 mt-10">
        <!-- JS will render shelves here -->
    </div>

    <!-- JS Scripts for libraries loading -->
    <!-- Load standard jQuery first for dFlip compatibility -->
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/libs/jquery.min.js"></script>
    
    <script>
        // ข้อมูลหนังสือแบบ Object Array (สามารถแก้ไข เพิ่ม-ลด ข้อมูลได้ที่นี่)
        const booksData = [
            {
                id: 'book1',
                cover: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=400&q=80',
                pdf: 'https://raw.githubusercontent.com/waroon01/service1/main/t1.pdf'
            },
            {
                id: 'book2',
                cover: 'https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=400&q=80',
                pdf: 'https://raw.githubusercontent.com/waroon01/service1/main/t1.pdf'
            },
            {
                id: 'book3',
                cover: 'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=400&q=80',
                pdf: 'https://raw.githubusercontent.com/waroon01/service1/main/t1.pdf'
            },
            {
                id: 'book4',
                cover: 'https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=400&q=80',
                pdf: 'https://raw.githubusercontent.com/waroon01/service1/main/t1.pdf'
            },
            {
                id: 'book5',
                cover: 'https://images.unsplash.com/photo-1529590003495-b2646e2718bf?auto=format&fit=crop&w=400&q=80',
                pdf: 'https://raw.githubusercontent.com/waroon01/service1/main/t1.pdf'
            },
            {
                id: 'book6',
                cover: 'https://images.unsplash.com/photo-1511556820780-d912e42b4980?auto=format&fit=crop&w=400&q=80',
                pdf: 'https://raw.githubusercontent.com/waroon01/service1/main/t1.pdf'
            }
        ];

        // ฟังก์ชันสร้างชั้นหนังสืออัตโนมัติจาก Object
        function renderBookshelf() {
            const container = document.getElementById('bookshelf-container');
            container.innerHTML = ''; // ล้างค่าเดิม
            
            // กำหนดว่า 1 ชั้นจะมีกี่เล่ม (เช่น 3 คอลัมน์)
            const columnsPerRow = 3;
            
            for (let i = 0; i < booksData.length; i += columnsPerRow) {
                // ดึงข้อมูลหนังสือทีละแถว
                const rowBooks = booksData.slice(i, i + columnsPerRow);
                
                // สร้าง div ของชั้นวาง
                const shelfDiv = document.createElement('div');
                shelfDiv.className = 'shelf grid grid-cols-1 sm:grid-cols-3 gap-6 px-4 md:px-12 items-end justify-items-center h-64';
                if (i > 0) shelfDiv.classList.add('mt-8'); // เพิ่ม margin ด้านบนถ้าไม่ใช่แถวแรก

                // นำหนังสือใส่ลงในชั้น
                rowBooks.forEach(book => {
                    const bookHTML = `
                        <div class="_df_thumb book-wrapper cursor-pointer group" id="${book.id}" source="${book.pdf}">
                            <img src="${book.cover}" 
                                 class="book-cover w-36 sm:w-44 h-56 sm:h-64 object-cover rounded-r-md rounded-l-sm" alt="Book ${book.id}">
                            <div class="click-hint absolute -top-12 left-1/2 transform -translate-x-1/2 bg-amber-500 text-slate-900 text-xs font-bold px-3 py-1.5 rounded-full shadow-lg whitespace-nowrap">
                                คลิกเพื่อเปิดอ่าน
                            </div>
                        </div>
                    `;    
                    shelfDiv.insertAdjacentHTML('beforeend', bookHTML);
                });
                
                container.appendChild(shelfDiv);
            }
        }

        // สั่งสร้าง HTML อัตโนมัติ (จะทำก่อนที่ script ของ dFlip ด้านล่างจะถูกโหลด)
        renderBookshelf();

        // กำหนดตำแหน่งโฟลเดอร์สำหรับทรัพยากรช่วยเหลือภายใน CDN เช่น THREE.js, PDF.js, sounds
        window.dFlipLocation = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/";
    </script>
    
    <!-- Load DearFlip core script -->
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

</body>
</html>
