<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบ OneSignal</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "c67167f2-e224-4efc-a843-aa94816e5220",
    // เพิ่ม 2 บรรทัดนี้ด้านล่างเพื่อบอกตำแหน่งไฟล์ใน GitHub Pages
    serviceWorkerPath: "dear-flip/onesignal/OneSignalSDKWorker.js",
    serviceWorkerParam: { scope: "/dear-flip/onesignal/" },
    notifyButton: {
      enable: true,
    }
  });
});
    </script>
</head>
<body>
    <h2>ทดสอบระบบ OneSignal Web Push</h2>
    <p>กดปุ่มกระดิ่งที่มุมขวาล่าง หรือกดยอมรับเมื่อมี Popup เด้งขึ้นมา เพื่อเปิดรับการแจ้งเตือน</p>
</body>
</html>
