<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบ OneSignal</title>
    
    <!-- นำเข้า OneSignal SDK เวอร์ชั่นล่าสุด (v16) -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          appId: "c67167f2-e224-4efc-a843-aa94816e5220", // <-- นำ App ID จาก OneSignal มาใส่ตรงนี้
          notifyButton: {
            enable: true, // เปิดปุ่มกระดิ่งให้ผู้ใช้กด Subscribe
          },
          allowLocalhostAsSecureOrigin: true // เปิดไว้สำหรับทดสอบบน localhost
        });
      });
    </script>
</head>
<body>
    <h2>ทดสอบระบบ OneSignal Web Push</h2>
    <p>กดปุ่มกระดิ่งที่มุมขวาล่าง หรือกดยอมรับเมื่อมี Popup เด้งขึ้นมา เพื่อเปิดรับการแจ้งเตือน</p>
</body>
</html>
